openapi: 3.0.3
info:
  title: PMS Hotel Management System API
  description: |
    Complete REST API documentation for the Property Management System.
    
    ## Authentication
    All endpoints (except login) require a Bearer token in the Authorization header.
    
    ## Base URL
    - Development: http://localhost:3001/api
    - Production: https://api.yourhotel.com/api
    
    ## Error Codes
    - 400 - Bad Request
    - 401 - Unauthorized
    - 403 - Forbidden
    - 404 - Not Found
    - 500 - Internal Server Error
  version: 1.0.0
  contact:
    name: API Support
    email: support@grandview.com

servers:
  - url: http://localhost:3001/api
    description: Development server
  - url: https://api.grandview.com/api
    description: Production server

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Hotels
    description: Hotel and branch management
  - name: Rooms
    description: Room and room type management
  - name: Guests
    description: Guest management
  - name: Reservations
    description: Reservation system
  - name: CheckInOut
    description: Check-in and check-out operations
  - name: Invoices
    description: Billing and invoicing
  - name: Payments
    description: Payment processing
  - name: Services
    description: Hotel services and POS
  - name: Housekeeping
    description: Housekeeping management
  - name: Maintenance
    description: Maintenance requests
  - name: Inventory
    description: Inventory management
  - name: Staff
    description: Staff and HR management
  - name: Reports
    description: Reports and analytics
  - name: Users
    description: User management
  - name: Roles
    description: Role management
  - name: Permissions
    description: Permission management
  - name: Settings
    description: System settings
  - name: Notifications
    description: Notification system

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
    Success:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            firstName:
              type: string
            lastName:
              type: string
            role:
              type: string

paths:
  # ============================================================
  # AUTHENTICATION
  # ============================================================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful

  /auth/profile:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Reset link sent

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Password reset successful

  # ============================================================
  # HOTELS
  # ============================================================
  /hotels:
    get:
      tags:
        - Hotels
      summary: Get all hotels
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of hotels
    post:
      tags:
        - Hotels
      summary: Create new hotel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hotelName:
                  type: string
                address:
                  type: string
                city:
                  type: string
                country:
                  type: string
                phone:
                  type: string
                email:
                  type: string
      responses:
        '201':
          description: Hotel created

  /hotels/{id}:
    get:
      tags:
        - Hotels
      summary: Get hotel by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Hotel details
        '404':
          description: Hotel not found
    put:
      tags:
        - Hotels
      summary: Update hotel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hotelName:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: Hotel updated
    delete:
      tags:
        - Hotels
      summary: Delete hotel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Hotel deleted

  /hotels/{hotelId}/branches:
    get:
      tags:
        - Hotels
      summary: Get hotel branches
      security:
        - bearerAuth: []
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of branches
    post:
      tags:
        - Hotels
      summary: Create branch
      security:
        - bearerAuth: []
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                branchName:
                  type: string
                address:
                  type: string
                phone:
                  type: string
      responses:
        '201':
          description: Branch created

  /hotels/{hotelId}/floors:
    get:
      tags:
        - Hotels
      summary: Get floors
      security:
        - bearerAuth: []
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of floors
    post:
      tags:
        - Hotels
      summary: Create floor
      security:
        - bearerAuth: []
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                floorNumber:
                  type: integer
                floorName:
                  type: string
      responses:
        '201':
          description: Floor created

  # ============================================================
  # ROOMS
  # ============================================================
  /rooms:
    get:
      tags:
        - Rooms
      summary: Get all rooms
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: floorId
          in: query
          schema:
            type: integer
        - name: roomTypeId
          in: query
          schema:
            type: integer
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of rooms
    post:
      tags:
        - Rooms
      summary: Create new room
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - branchId
                - roomNumber
                - roomTypeId
                - floorId
              properties:
                branchId:
                  type: integer
                roomNumber:
                  type: string
                roomTypeId:
                  type: integer
                floorId:
                  type: integer
                status:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: Room created

  /rooms/{id}:
    get:
      tags:
        - Rooms
      summary: Get room by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Room details
    put:
      tags:
        - Rooms
      summary: Update room
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roomNumber:
                  type: string
                roomTypeId:
                  type: integer
                floorId:
                  type: integer
                status:
                  type: string
      responses:
        '200':
          description: Room updated
    delete:
      tags:
        - Rooms
      summary: Delete room
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Room deleted

  /rooms/availability/check:
    get:
      tags:
        - Rooms
      summary: Check room availability
      security:
        - bearerAuth: []
      parameters:
        - name: checkIn
          in: query
          required: true
          schema:
            type: string
        - name: checkOut
          in: query
          required: true
          schema:
            type: string
        - name: roomTypeId
          in: query
          schema:
            type: integer
        - name: guests
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Available rooms

  /rooms/types/list:
    get:
      tags:
        - Rooms
      summary: Get room types
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of room types

  /rooms/types:
    post:
      tags:
        - Rooms
      summary: Create room type
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - typeName
                - basePrice
              properties:
                typeName:
                  type: string
                description:
                  type: string
                capacity:
                  type: integer
                basePrice:
                  type: number
                maxOccupancy:
                  type: integer
                bedType:
                  type: string
                sizeSqFt:
                  type: integer
      responses:
        '201':
          description: Room type created

  /rooms/types/{id}:
    get:
      tags:
        - Rooms
      summary: Get room type by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Room type details
    put:
      tags:
        - Rooms
      summary: Update room type
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                typeName:
                  type: string
                description:
                  type: string
                basePrice:
                  type: number
      responses:
        '200':
          description: Room type updated
    delete:
      tags:
        - Rooms
      summary: Delete room type
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Room type deleted

  /rooms/amenities:
    get:
      tags:
        - Rooms
      summary: Get room amenities
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of amenities
    post:
      tags:
        - Rooms
      summary: Create amenity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amenityName
              properties:
                amenityName:
                  type: string
                amenityType:
                  type: string
                description:
                  type: string
                icon:
                  type: string
      responses:
        '201':
          description: Amenity created

  /rooms/amenities/{id}:
    delete:
      tags:
        - Rooms
      summary: Delete amenity
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Amenity deleted

  /rooms/status-board:
    get:
      tags:
        - Rooms
      summary: Get room status board
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Status board data

  # ============================================================
  # GUESTS
  # ============================================================
  /guests:
    get:
      tags:
        - Guests
      summary: Get all guests
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: vipStatus
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of guests
    post:
      tags:
        - Guests
      summary: Create new guest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                nationality:
                  type: string
                dateOfBirth:
                  type: string
                  format: date
                gender:
                  type: string
                address:
                  type: string
                city:
                  type: string
                country:
                  type: string
                postalCode:
                  type: string
                vipStatus:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: Guest created

  /guests/{id}:
    get:
      tags:
        - Guests
      summary: Get guest by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Guest details
    put:
      tags:
        - Guests
      summary: Update guest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                phone:
                  type: string
      responses:
        '200':
          description: Guest updated
    delete:
      tags:
        - Guests
      summary: Delete guest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Guest deleted

  /guests/{id}/documents:
    get:
      tags:
        - Guests
      summary: Get guest documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of documents
    post:
      tags:
        - Guests
      summary: Add guest document
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - documentType
              properties:
                documentType:
                  type: string
                documentNumber:
                  type: string
                issueDate:
                  type: string
                  format: date
                expiryDate:
                  type: string
                  format: date
                imageUrl:
                  type: string
      responses:
        '201':
          description: Document added

  /guests/{id}/preferences:
    get:
      tags:
        - Guests
      summary: Get guest preferences
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of preferences
    post:
      tags:
        - Guests
      summary: Add guest preference
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - preferenceType
              properties:
                preferenceType:
                  type: string
                preferenceValue:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: Preference added

  /guests/{id}/loyalty:
    get:
      tags:
        - Guests
      summary: Get guest loyalty info
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Loyalty information
    put:
      tags:
        - Guests
      summary: Update guest loyalty
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                points:
                  type: integer
                tierLevel:
                  type: string
      responses:
        '200':
          description: Loyalty updated

  /guests/{id}/reservations:
    get:
      tags:
        - Guests
      summary: Get guest reservation history
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of reservations

  # ============================================================
  # RESERVATIONS
  # ============================================================
  /reservations:
    get:
      tags:
        - Reservations
      summary: Get all reservations
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: checkIn
          in: query
          schema:
            type: string
            format: date
        - name: checkOut
          in: query
          schema:
            type: string
            format: date
        - name: source
          in: query
          schema:
            type: string
        - name: guestId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of reservations
    post:
      tags:
        - Reservations
      summary: Create new reservation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - guestId
                - branchId
                - checkInDate
                - checkOutDate
                - bookingSource
                - totalAmount
              properties:
                guestId:
                  type: integer
                branchId:
                  type: integer
                checkInDate:
                  type: string
                  format: date
                checkOutDate:
                  type: string
                  format: date
                bookingSource:
                  type: string
                adults:
                  type: integer
                children:
                  type: integer
                specialRequests:
                  type: string
                totalAmount:
                  type: number
                depositAmount:
                  type: number
                depositPaid:
                  type: boolean
      responses:
        '201':
          description: Reservation created

  /reservations/{id}:
    get:
      tags:
        - Reservations
      summary: Get reservation by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reservation details
    put:
      tags:
        - Reservations
      summary: Update reservation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                checkInDate:
                  type: string
                  format: date
                checkOutDate:
                  type: string
                  format: date
                adults:
                  type: integer
                children:
                  type: integer
                specialRequests:
                  type: string
                totalAmount:
                  type: number
                status:
                  type: string
      responses:
        '200':
          description: Reservation updated
    delete:
      tags:
        - Reservations
      summary: Delete reservation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reservation deleted

  /reservations/{id}/cancel:
    post:
      tags:
        - Reservations
      summary: Cancel reservation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Reservation cancelled

  /reservations/{id}/confirm:
    post:
      tags:
        - Reservations
      summary: Confirm reservation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reservation confirmed

  /reservations/{id}/checkin:
    post:
      tags:
        - Reservations
      summary: Check-in guest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roomId
              properties:
                roomId:
                  type: integer
                keyCardNumber:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Check-in successful

  /reservations/{id}/checkout:
    post:
      tags:
        - Reservations
      summary: Check-out guest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - totalBill
              properties:
                totalBill:
                  type: number
                paymentStatus:
                  type: string
                roomInspected:
                  type: boolean
                inspectionNotes:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Check-out successful

  /reservations/{id}/notes:
    get:
      tags:
        - Reservations
      summary: Get reservation notes
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of notes
    post:
      tags:
        - Reservations
      summary: Add reservation note
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
